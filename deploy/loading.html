<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>zk-eidas Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
  .container { text-align: center; max-width: 480px; padding: 2rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; }
  p { color: #94a3b8; margin-bottom: 1.5rem; }
  .spinner { width: 40px; height: 40px; margin: 0 auto 1.5rem; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<meta http-equiv="refresh" content="3">
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <h1>zk-eidas Demo</h1>
  <p>Starting up... this page will refresh automatically.</p>
</div>
</body>
</html>
