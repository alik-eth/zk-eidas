server {
    listen 8080;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;

    # Serve loading page when frontend upstream is unavailable
    error_page 502 503 504 /loading.html;
    location = /loading.html {
        root /app;
        internal;
    }

    # Return JSON 503 when API upstream is unavailable
    location = /api-unavailable.json {
        internal;
        default_type application/json;
        return 503 '{"error":"API is starting up, please retry in a few seconds"}';
    }

    location /issuer/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 /api-unavailable.json;
    }

    location /holder/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 /api-unavailable.json;
    }

    location /verifier/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 /api-unavailable.json;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_intercept_errors on;
    }
}
